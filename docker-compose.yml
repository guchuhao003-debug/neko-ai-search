services:
    backend:
        build:
            context: ./backend
        env_file:
            - ./backend/.env
        ports:
            - "8000:8000"
        volumes:
            - ./backend/data:/app/data
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
                ]
            interval: 30s
            timeout: 5s
            retries: 3

    frontend:
        build:
            context: ./frontend
            args:
                VITE_API_BASE_URL: http://localhost:8000
        ports:
            - "5173:80"
        depends_on:
            backend:
                condition: service_healthy
        restart: unless-stopped
