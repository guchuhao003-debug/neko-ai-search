services:
    caddy:
        image: caddy:2.8-alpine
        depends_on:
            backend:
                condition: service_healthy
            frontend:
                condition: service_started
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        restart: unless-stopped

    backend:
        build:
            context: ./backend
        env_file:
            - ./deploy/backend.env
        expose:
            - "8000"
        volumes:
            - ./backend/data:/app/data
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
                ]
            interval: 30s
            timeout: 5s
            retries: 3

    frontend:
        build:
            context: ./frontend
            args:
                VITE_API_BASE_URL: ""
        expose:
            - "80"
        restart: unless-stopped

volumes:
    caddy_data:
    caddy_config:
